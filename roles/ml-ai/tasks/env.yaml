# REPOSITORIES
- name: Install EPEL release
  dnf:
    name: epel-release
    state: present

- name: Enable CRB repository
  command: dnf config-manager --set-enabled crb
  changed_when: false

# SYSTEM PACKAGES
- name: Install base packages
  dnf:
    name:
      - gcc
      - gcc-c++
      - make
      - curl
      - git
      - redhat-rpm-config
      - rrdtool
      - rrdtool-devel
    state: present

- name: Install Python 3.11 packages
  dnf:
    name:
      - python3.11
      - python3.11-devel
      - python3.11-pip
    state: present

# DIRECTORY SETUP
- name: Create base directory
  file:
    path: "{{ base_dir }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"

# VIRTUAL ENV
- name: Create virtual environment
  become_user: "{{ target_user }}"
  command: python3.11 -m venv {{ venv_dir }}
  args:
    creates: "{{ venv_dir }}"

- name: Upgrade pip
  become_user: "{{ target_user }}"
  pip:
    virtualenv: "{{ venv_dir }}"
    name:
      - pip
    state: latest

# PYTHON DEPENDENCIES
- name: Install Python dependencies
  become_user: "{{ target_user }}"
  pip:
    virtualenv: "{{ venv_dir }}"
    name:
      - rrdtool-bindings
      - pydantic-ai
      - langchain
      - langchain-ollama
      - langchain-core
      - langgraph
      - langchain-community
      - pandas
      - numpy
      - matplotlib
      - torch
      - seaborn
      - scikit-learn
      - statsmodels
      - pymysql
# OLLAMA
- name: Install Ollama
  shell: curl -fsSL https://ollama.com/install.sh | sh
  args:
    creates: /usr/local/bin/ollama

- name: Enable and start Ollama
  systemd:
    name: ollama
    state: started
    enabled: yes
    
